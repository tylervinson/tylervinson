<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Isometric Cube</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #f4f4f4;
      font-family: system-ui, sans-serif;
    }

    canvas {
      background: white;
      border: 1px solid #ccc;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.12);
    }
  </style>
</head>
<body>
  <canvas id="canvas" width="500" height="400"></canvas>

  <script>
    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d");

    const origin = { x: 250, y: 190 };
    const size = 90;

    // Isometric direction vectors
    const right = {
      x: Math.cos(Math.PI / 6) * size,
      y: Math.sin(Math.PI / 6) * size
    };

    const left = {
      x: -Math.cos(Math.PI / 6) * size,
      y: Math.sin(Math.PI / 6) * size
    };

    const up = {
      x: 0,
      y: -size
    };

    function add(a, b) {
      return { x: a.x + b.x, y: a.y + b.y };
    }

    function polygon(points, fill, stroke = "#222") {
      ctx.beginPath();
      ctx.moveTo(points[0].x, points[0].y);

      for (let i = 1; i < points.length; i++) {
        ctx.lineTo(points[i].x, points[i].y);
      }

      ctx.closePath();
      ctx.fillStyle = fill;
      ctx.fill();
      ctx.strokeStyle = stroke;
      ctx.lineWidth = 2;
      ctx.stroke();
    }

    function drawCube() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      const top = origin;
      const r = add(top, right);
      const l = add(top, left);
      const b = add(r, left);

      const top2 = add(top, up);
      const r2 = add(r, up);
      const l2 = add(l, up);

      // Draw order matters: hidden/back faces first, visible faces last.
      polygon([top2, r2, r, top], "#d9d9d9"); // right face
      polygon([top2, l2, l, top], "#bfbfbf"); // left face
      polygon([top2, r2, b, l2], "#eeeeee"); // top face
    }

    drawCube();
  </script>
</body>
</html>
