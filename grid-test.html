    <style class="image-grid-styles">
        .image-grid-widget .image-grid { display: flex; flex-wrap: wrap; gap: 10px; }
        .image-grid-widget .grid-item { flex: 0 0 calc(33.333% - 7px); aspect-ratio: 4/3; }
        .image-grid-widget .grid-item[data-hidden="true"] { display: none; }
        .image-grid-widget .grid-img { width: 100%; height: 100%; object-fit: cover; display: block; }
    </style>
